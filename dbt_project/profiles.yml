# profiles.yml
# dbt-spark profile — connects to local Spark Thrift Server
#
# To start Thrift Server on EC2:
#   $SPARK_HOME/sbin/start-thriftserver.sh \
#     --master local[*] \
#     --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension \
#     --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog \
#     --conf spark.sql.warehouse.dir=s3a://anukuche-olist-datalake/warehouse
#
# To migrate to Databricks later:
#   Just change 'method' to 'token', add 'host', 'token', 'http_path'

olist_spark:
  target: dev
  outputs:
    dev:
      type: spark
      method: thrift
      host: localhost
      port: 10000
      schema: gold
      connect_retries: 3
      connect_timeout: 60

    # Databricks (Phase 3 — uncomment when ready):
